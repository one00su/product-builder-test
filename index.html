<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎱 로또 번호 추첨기</title>
    <meta name="description" content="행운의 로또 번호를 추첨해보세요! 버튼 클릭 한 번으로 5세트의 번호를 생성합니다.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="다크/라이트 모드 전환">
        <span class="icon-moon">🌙</span>
        <span class="icon-sun">☀️</span>
    </button>

    <div class="bg-particles" id="bgParticles"></div>
    <div class="confetti-container" id="confettiContainer"></div>

    <div class="container">
        <div class="card">
            <h1><span class="emoji">🎱</span> 로또 번호 추첨기</h1>
            <p class="subtitle">버튼을 누르면 5세트의 행운의 번호가 나옵니다!</p>

            <div class="sets-container" id="setsContainer"></div>

            <button class="draw-btn" id="drawBtn" onclick="drawNumbers()">
                <span class="btn-icon">🎰</span> 번호 추첨 (5세트)
            </button>

            <div class="history" id="historySection" style="display: none;">
                <p class="history-title">📋 추첨 기록</p>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
